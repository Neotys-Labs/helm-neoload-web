suite: test ingress annotations validation
templates:
  - ingress.yaml
tests:
  - it: should fail when haproxy.router.openshift.io/rewrite-target annotation is used
    release:
      namespace: default
    set:
      services.webapp.host: myapp.example.com
      services.api.host: myapi.example.com
      services.files.host: myfiles.example.com
      domain: .example.com
      ingress.enabled: true
      ingress.annotations:
        haproxy.router.openshift.io/rewrite-target: /
    asserts:
      - failedTemplate:
          errorMessage: "Breaking change: The annotation 'haproxy.router.openshift.io/rewrite-target' is not supported. See https://github.com/Neotys-Labs/helm-neoload-web/blob/master/doc/upgrade-2025.2.x-to-2026.1.x.md for details. Set 'migration.skipBreakingChangesChecks: true' to bypass this check."

  - it: should fail when nginx.ingress.kubernetes.io/rewrite-target annotation is used
    release:
      namespace: default
    set:
      services.webapp.host: myapp.example.com
      services.api.host: myapi.example.com
      services.files.host: myfiles.example.com
      domain: .example.com
      ingress.enabled: true
      ingress.annotations:
        nginx.ingress.kubernetes.io/rewrite-target: /
    asserts:
      - failedTemplate:
          errorMessage: "Breaking change: The annotation 'nginx.ingress.kubernetes.io/rewrite-target' is not supported. See https://github.com/Neotys-Labs/helm-neoload-web/blob/master/doc/upgrade-2025.2.x-to-2026.1.x.md for details. Set 'migration.skipBreakingChangesChecks: true' to bypass this check."

  - it: should fail when haproxy-ingress.github.io/rewrite-target annotation is used
    release:
      namespace: default
    set:
      services.webapp.host: myapp.example.com
      services.api.host: myapi.example.com
      services.files.host: myfiles.example.com
      domain: .example.com
      ingress.enabled: true
      ingress.annotations:
        haproxy-ingress.github.io/rewrite-target: /
    asserts:
      - failedTemplate:
          errorMessage: "Breaking change: The annotation 'haproxy-ingress.github.io/rewrite-target' is not supported. See https://github.com/Neotys-Labs/helm-neoload-web/blob/master/doc/upgrade-2025.2.x-to-2026.1.x.md for details. Set 'migration.skipBreakingChangesChecks: true' to bypass this check."

  - it: should fail when traefik.ingress.kubernetes.io/rewrite-target annotation is used
    release:
      namespace: default
    set:
      services.webapp.host: myapp.example.com
      services.api.host: myapi.example.com
      services.files.host: myfiles.example.com
      domain: .example.com
      ingress.enabled: true
      ingress.annotations:
        traefik.ingress.kubernetes.io/rewrite-target: /
    asserts:
      - failedTemplate:
          errorMessage: "Breaking change: The annotation 'traefik.ingress.kubernetes.io/rewrite-target' is not supported. See https://github.com/Neotys-Labs/helm-neoload-web/blob/master/doc/upgrade-2025.2.x-to-2026.1.x.md for details. Set 'migration.skipBreakingChangesChecks: true' to bypass this check."

  - it: should allow valid annotations
    release:
      namespace: default
    set:
      services.webapp.host: myapp.example.com
      services.api.host: myapi.example.com
      services.files.host: myfiles.example.com
      domain: .example.com
      ingress.enabled: true
      ingress.annotations:
        nginx.ingress.kubernetes.io/proxy-body-size: "500m"
    asserts:
      - isKind:
          of: Ingress
      - equal:
          path: metadata.annotations["nginx.ingress.kubernetes.io/proxy-body-size"]
          value: "500m"
      - notExists:
          path: spec.tls

  - it: should render valid Ingress when ingress.tls has only secretName (auto hosts, SWAT-9562)
    release:
      namespace: default
    set:
      services.webapp.host: myapp.example.com
      services.api.host: myapi.example.com
      services.api-v4.host: myapi.example.com
      services.files.host: myfiles.example.com
      domain: .example.com
      ingress.enabled: true
      ingress.tls[0].secretName: my-tls
    asserts:
      - isKind:
          of: Ingress
      - equal:
          path: spec.tls[0].secretName
          value: my-tls
      - lengthEqual:
          path: spec.tls[0].hosts
          count: 4

  - it: should render valid Ingress when ingress.tls has explicit hosts list
    release:
      namespace: default
    set:
      services.webapp.host: myapp.example.com
      services.api.host: myapi.example.com
      services.api-v4.host: myapi.example.com
      services.files.host: myfiles.example.com
      domain: .example.com
      ingress:
        enabled: true
        tls:
          - secretName: cert-tls
            hosts:
              - cert-host-one.example.com
              - cert-host-two.example.com
    asserts:
      - isKind:
          of: Ingress
      - equal:
          path: spec.tls[0].secretName
          value: cert-tls
      - lengthEqual:
          path: spec.tls[0].hosts
          count: 2
      - contains:
          path: spec.tls[0].hosts
          content: cert-host-one.example.com
      - contains:
          path: spec.tls[0].hosts
          content: cert-host-two.example.com

  # Per-host TLS secrets (one spec.tls[] entry per secret); see README (Ingress TLS termination).
  - it: should render valid Ingress with multiple tls entries and per-host secrets
    release:
      namespace: default
    set:
      services.webapp.host: app.mycompany.com
      services.api.host: api.mycompany.com
      services.api-v4.host: api.mycompany.com
      services.files.host: files.mycompany.com
      domain: .mycompany.com
      ingress:
        enabled: true
        tls:
          - hosts:
              - app.mycompany.com
            secretName: neoload-web-tls
          - hosts:
              - api.mycompany.com
            secretName: neoload-api-tls
          - hosts:
              - files.mycompany.com
            secretName: neoload-files-tls
    asserts:
      - isKind:
          of: Ingress
      - lengthEqual:
          path: spec.tls
          count: 3
      - equal:
          path: spec.tls[0].secretName
          value: neoload-web-tls
      - equal:
          path: spec.tls[0].hosts[0]
          value: app.mycompany.com
      - equal:
          path: spec.tls[1].secretName
          value: neoload-api-tls
      - equal:
          path: spec.tls[1].hosts[0]
          value: api.mycompany.com
      - equal:
          path: spec.tls[2].secretName
          value: neoload-files-tls
      - equal:
          path: spec.tls[2].hosts[0]
          value: files.mycompany.com

  - it: should render valid Ingress with ingressClassName and TLS secretName only
    release:
      namespace: default
    set:
      services.webapp.host: myapp.example.com
      services.api.host: myapi.example.com
      services.api-v4.host: myapi.example.com
      services.files.host: myfiles.example.com
      domain: .example.com
      ingress.enabled: true
      ingress.className: traefik
      ingress.tls[0].secretName: combined-tls
    asserts:
      - isKind:
          of: Ingress
      - equal:
          path: spec.ingressClassName
          value: traefik
      - equal:
          path: spec.tls[0].secretName
          value: combined-tls
      - lengthEqual:
          path: spec.tls[0].hosts
          count: 4

  - it: should allow haproxy rewrite-target when migration.skipBreakingChangesChecks is true
    release:
      namespace: default
    set:
      services.webapp.host: myapp.example.com
      services.api.host: myapi.example.com
      services.files.host: myfiles.example.com
      domain: .example.com
      ingress.enabled: true
      migration.skipBreakingChangesChecks: true
      ingress.annotations:
        haproxy.router.openshift.io/rewrite-target: /
    asserts:
      - isKind:
          of: Ingress
      - equal:
          path: metadata.annotations["haproxy.router.openshift.io/rewrite-target"]
          value: "/"

  - it: should allow nginx rewrite-target when migration.skipBreakingChangesChecks is true
    release:
      namespace: default
    set:
      services.webapp.host: myapp.example.com
      services.api.host: myapi.example.com
      services.files.host: myfiles.example.com
      domain: .example.com
      ingress.enabled: true
      migration.skipBreakingChangesChecks: true
      ingress.annotations:
        nginx.ingress.kubernetes.io/rewrite-target: /
    asserts:
      - isKind:
          of: Ingress
      - equal:
          path: metadata.annotations["nginx.ingress.kubernetes.io/rewrite-target"]
          value: "/"
